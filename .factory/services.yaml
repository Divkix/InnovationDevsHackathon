commands:
  install: npm install
  dev: npx vite --port 5173
  build: npx vite build
  test: npx vitest run
  test:watch: npx vitest
  typecheck: npx tsc --noEmit
  lint: npx eslint .

services:
  dev:
    start: npx vite --port 5173 --host
    stop: lsof -ti :5173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: []
